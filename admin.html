<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DB3D Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── CSS VARS（暖色系，與 index 一致）── */
:root{
  --bg:   #1C1814;
  --s1:   #241F1A;
  --s2:   #2E2720;
  --s3:   #3A322A;
  --b1:   #3D342B;
  --b2:   #4E4338;
  --b3:   #6B5D4E;
  --t1:   #F0EAE0;
  --t2:   #B0A090;
  --t3:   #786A5A;
  --acc:  #E07030;
  --acc2: #C05820;
  --deep: #9A6840;
  --green:#5BAA6A;
  --red:  #C05050;
  --r:    10px;
  --mono: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.6;display:flex;flex-direction:column;min-height:100vh;}
button,input,textarea,select{font-family:inherit;}
.mono{font-family:var(--mono);font-size:12px;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999;}
.login-box{width:380px;padding:44px;background:var(--s1);border:1px solid var(--b2);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.login-brand{font-family:var(--mono);font-size:11px;letter-spacing:4px;color:var(--acc);margin-bottom:6px;}
.login-box h1{font-size:22px;font-weight:700;color:var(--t1);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-family:var(--mono);letter-spacing:1.5px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;}
.field input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:12px 14px;color:var(--t1);font-size:15px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--acc);}
.btn-login{width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-login:hover{background:var(--acc2);}
.login-err{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:20px;}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100vh;}
#app.on{display:flex;}

/* ── TOPBAR ── */
.topbar{height:56px;padding:0 24px;flex-shrink:0;display:flex;align-items:center;gap:14px;
  background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:50;}
.topbar-brand{font-family:var(--mono);font-size:12px;letter-spacing:3px;color:var(--acc);margin-right:auto;}
.save-status{font-family:var(--mono);font-size:11px;color:var(--t3);transition:color .3s;}
.save-status.ok{color:var(--green);}
.save-status.err{color:var(--red);}
.save-status.saving{color:var(--acc);}
.tb-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-family:var(--mono);letter-spacing:.5px;
  background:var(--s2);border:1px solid var(--b2);color:var(--t2);cursor:pointer;text-decoration:none;transition:all .2s;}
.tb-btn:hover{border-color:var(--acc);color:var(--acc);}
.tb-btn.danger{color:var(--red);border-color:var(--red);}
.tb-btn.danger:hover{background:var(--red);color:#fff;}
.tb-btn.accent{background:var(--acc);border-color:var(--acc);color:#fff;}
.tb-btn.accent:hover{background:var(--acc2);}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;min-height:0;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;}
.sb-label{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--t3);
  text-transform:uppercase;padding:16px 16px 8px;}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;
  padding:11px 16px;background:transparent;border:none;color:var(--t2);
  cursor:pointer;text-align:left;font-size:13px;transition:all .15s;border-left:3px solid transparent;}
.cat-btn:hover{background:var(--s2);color:var(--t1);}
.cat-btn.active{background:var(--s2);color:var(--t1);border-left-color:var(--acc);}
.cat-btn .cnt{font-family:var(--mono);font-size:10px;color:var(--t3);
  background:var(--s3);padding:2px 7px;border-radius:99px;}
.sb-add{margin:12px;padding:9px;background:transparent;border:1px dashed var(--b2);
  border-radius:8px;color:var(--t3);cursor:pointer;font-size:13px;transition:all .2s;}
.sb-add:hover{border-color:var(--acc);color:var(--acc);}
.sb-footer{padding:12px 16px;border-top:1px solid var(--b1);margin-top:auto;}
.sb-footer a{font-size:12px;color:var(--t3);text-decoration:none;transition:color .2s;}
.sb-footer a:hover{color:var(--acc);}

/* ── MAIN AREA ── */
.main{flex:1;overflow-y:auto;padding:28px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:14px;color:var(--t3);}
.ei{font-size:48px;}

/* ── CAT HEADER ── */
.cat-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.cat-hd h2{font-size:20px;font-weight:700;color:var(--t1);}
.btn-pub{padding:10px 22px;background:var(--acc);border:none;border-radius:10px;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit;}
.btn-pub:hover{background:var(--acc2);}
.cat-meta{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
.mf{display:flex;align-items:center;gap:8px;}
.mf label{font-size:11px;font-family:var(--mono);letter-spacing:1px;color:var(--t3);}
.mf input{background:var(--s2);border:1px solid var(--b2);border-radius:8px;
  padding:7px 12px;color:var(--t1);font-size:13px;outline:none;transition:border-color .2s;}
.mf input:focus{border-color:var(--acc);}
.btn-del-cat{padding:7px 14px;background:transparent;border:1px solid var(--red);
  border-radius:8px;color:var(--red);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;}
.btn-del-cat:hover{background:var(--red);color:#fff;}

/* ── FAQ CARD ── */
.faq-list{display:flex;flex-direction:column;gap:10px;}
.faq-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;transition:border-color .2s;}
.faq-card:hover{border-color:var(--b2);}
.faq-card.open{border-color:rgba(224,112,48,.35);}
.card-top{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;}
.drag{color:var(--t3);cursor:grab;font-size:16px;}
.card-qprev{flex:1;font-size:14px;color:var(--t2);}
.card-acts{display:flex;gap:6px;flex-shrink:0;}
.ic{width:28px;height:28px;border-radius:7px;border:1px solid var(--b2);
  background:var(--s2);color:var(--t3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ic:hover{border-color:var(--b3);color:var(--t1);}
.ic.del:hover{border-color:var(--red);color:var(--red);}

/* ── CARD BODY（大幅放大）── */
.card-body{display:none;padding:0 16px 20px;border-top:1px solid var(--b1);}
.faq-card.open .card-body{display:block;}
.form-row{margin-top:16px;}
.flabel{display:block;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:8px;}
.q-inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);
  padding:12px 14px;color:var(--t1);font-size:15px;outline:none;transition:border-color .2s;}
.q-inp:focus{border-color:var(--acc);}

/* ── ANSWER EDITOR（大！）── */
.editor-wrap{margin-top:8px;}
.toolbar{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px;
  background:var(--s2);border:1px solid var(--b2);border-radius:var(--r) var(--r) 0 0;border-bottom:none;}
.tool-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--b2);background:var(--s3);
  color:var(--t2);font-size:12px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tool-btn:hover{border-color:var(--acc);color:var(--acc);}
.tool-sep{width:1px;background:var(--b2);margin:0 3px;align-self:stretch;}
.editor-tabs{display:flex;gap:0;border:1px solid var(--b2);border-bottom:none;
  border-radius:0;overflow:hidden;}
.etab{padding:9px 20px;font-size:12px;font-family:var(--mono);letter-spacing:.5px;
  cursor:pointer;color:var(--t3);background:var(--s2);border-right:1px solid var(--b2);transition:all .2s;}
.etab:last-child{border-right:none;}
.etab.active{background:var(--s3);color:var(--t1);}
.etab:hover:not(.active){color:var(--t2);}

/* ── TEXTAREA（核心：超大可用）── */
textarea.a-inp{
  width:100%;
  min-height:420px;          /* 大幅放大，預設 420px */
  background:var(--s2);
  border:1px solid var(--b2);
  border-top:none;
  border-radius:0 0 var(--r) var(--r);
  padding:16px 18px;
  color:var(--t1);
  font-size:14px;
  font-family:'Noto Sans TC', monospace;
  line-height:1.8;
  outline:none;
  resize:vertical;           /* 可手動拉高 */
  transition:border-color .2s;
}
textarea.a-inp:focus{border-color:var(--acc);}

/* ── PREVIEW AREA（也放大）── */
.editor-pane{display:none;}
.editor-pane.active{display:block;}
.preview-area{
  min-height:420px;
  padding:20px 22px;
  background:var(--s2);
  border:1px solid var(--b2);
  border-top:none;
  border-radius:0 0 var(--r) var(--r);
  font-size:14px;
  line-height:1.85;
  color:var(--t2);
  overflow-y:auto;
}
.up-status{display:none;font-size:12px;color:var(--acc);padding:6px 0;}

/* ── ADD FAQ BTN ── */
.btn-add-faq{width:100%;margin-top:14px;padding:14px;background:transparent;
  border:2px dashed var(--b2);border-radius:var(--r);color:var(--t3);
  font-size:14px;cursor:pointer;transition:all .2s;}
.btn-add-faq:hover{border-color:var(--acc);color:var(--acc);}

/* ── SETUP PANEL ── */
.setup-panel{background:var(--s2);border:1px solid rgba(224,112,48,.3);border-radius:14px;padding:24px;margin-bottom:26px;}
.setup-panel h3{font-size:15px;font-weight:700;color:var(--acc);margin-bottom:8px;}
.setup-panel p{font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.7;}
.setup-panel a{color:var(--acc);}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.cfg-grid.one{grid-template-columns:1fr;}
.cfg-field label{display:block;font-size:11px;font-family:var(--mono);letter-spacing:1px;color:var(--t3);margin-bottom:5px;}
.cfg-field input{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:8px;
  padding:10px 12px;color:var(--t1);font-size:13px;outline:none;transition:border-color .2s;}
.cfg-field input:focus{border-color:var(--acc);}
.btn-cfg{padding:10px 20px;background:var(--acc);border:none;border-radius:8px;color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.overlay.on{display:flex;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:30px;width:440px;max-width:90vw;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.7;}
.modal input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;
  padding:11px 14px;color:var(--t1);font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s;}
.modal input:focus{border-color:var(--acc);}
.modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}
.btn{padding:9px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;}
.btn.ghost{background:transparent;border:1px solid var(--b2);color:var(--t2);}
.btn.ghost:hover{border-color:var(--b3);color:var(--t1);}
.btn.ok{background:var(--acc);border:1px solid var(--acc);color:#fff;}
.btn.ok:hover{background:var(--acc2);}
.btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn.danger:hover{background:var(--red);color:#fff;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--s2);border:1px solid var(--b2);
  border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:14px;
  box-shadow:0 6px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;transform:translateY(8px);
  transition:all .25s;max-width:340px;}
.toast.show{opacity:1;pointer-events:auto;transform:translateY(0);}
.toast.err{border-color:var(--red);}

/* ── CHANGE PW MODAL ── */
#changePwOverlay .modal p{color:var(--t3);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">DB3D.RENDER</div>
    <h1>管理員後台</h1>
    <p class="login-sub">FAQ 內容管理系統</p>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="pwInput" placeholder="輸入管理員密碼">
    </div>
    <button class="btn-login" id="loginBtn">登入</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">DB3D · ADMIN</div>
    <span id="saveStatus" class="save-status mono">就緒</span>
    <button class="tb-btn" id="changePwBtn" title="更改登入密碼">🔑 更改密碼</button>
    <a href="./index.html" target="_blank" class="tb-btn">↗ 預覽學員版</a>
    <button class="tb-btn danger" id="logoutBtn">登出</button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sb-label">分類管理</div>
      <div id="catList"></div>
      <button class="sb-add" id="addCatBtn">＋ 新增分類</button>
      <div class="sb-footer">
        <a href="./index.html" target="_blank">🌐 學員版網頁 ↗</a>
      </div>
    </div>
    <div class="main" id="mainArea">
      <div class="empty"><div class="ei">👈</div><p>選擇左側分類開始編輯</p></div>
    </div>
  </div>
</div>

<!-- MODAL: 新增分類 -->
<div class="overlay" id="addCatOverlay">
  <div class="modal">
    <h3>新增分類</h3>
    <p>填入分類名稱與標籤（標籤用於學員端篩選按鈕）</p>
    <input id="ncName" placeholder="分類名稱，例如：SketchUp 進階技巧">
    <input id="ncTag"  placeholder="標籤，例如：SketchUp">
    <div class="modal-btns">
      <button class="btn ghost" id="ncCancel">取消</button>
      <button class="btn ok" id="ncConfirm">新增</button>
    </div>
  </div>
</div>

<!-- MODAL: 確認刪除 -->
<div class="overlay" id="delOverlay">
  <div class="modal">
    <h3>確認刪除</h3>
    <p id="delMsg"></p>
    <div class="modal-btns">
      <button class="btn ghost" id="delCancel">取消</button>
      <button class="btn danger" id="delConfirm">確認刪除</button>
    </div>
  </div>
</div>

<!-- MODAL: 更改密碼 -->
<div class="overlay" id="changePwOverlay">
  <div class="modal">
    <h3>🔑 更改登入密碼</h3>
    <p>更改後下次登入需使用新密碼，密碼儲存在此瀏覽器。</p>
    <input type="password" id="cpCur"  placeholder="目前密碼">
    <input type="password" id="cpNew1" placeholder="新密碼（至少 6 字元）">
    <input type="password" id="cpNew2" placeholder="再次輸入新密碼確認">
    <div class="modal-btns">
      <button class="btn ghost" id="cpCancel">取消</button>
      <button class="btn ok" id="cpConfirm">確認更改</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

<!-- Hidden file input -->
<input type="file" id="imgFile" accept="image/*" style="display:none">

<script>
// ═══════════════════════════════════════
let ADMIN_PASSWORD = localStorage.getItem('admin_pw') || 'DB3DADMIN2024';
// ═══════════════════════════════════════

let FAQ   = [];
let catI  = -1;
let openSet = new Set();
let delCb   = null;
let imgCb   = null;

const ls    = k => localStorage.getItem(k);
const lsSet = (k,v) => localStorage.setItem(k,v);
let GH_OWNER = ls('gh_owner'), GH_REPO = ls('gh_repo'), GH_TOKEN = ls('gh_token');
const GH_FAQ = 'faq.json', GH_IMG = 'images';

// ── LOGIN ──────────────────────────────
document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('pwInput').onkeydown = e => { if(e.key==='Enter') doLogin(); };
function doLogin(){
  if(document.getElementById('pwInput').value === ADMIN_PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('on');
    loadFAQ();
  } else {
    document.getElementById('loginErr').textContent = '密碼錯誤';
  }
}
document.getElementById('logoutBtn').onclick = () => {
  document.getElementById('app').classList.remove('on');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
};

// ── 更改密碼 ──────────────────────────
document.getElementById('changePwBtn').onclick = () => {
  document.getElementById('cpCur').value='';
  document.getElementById('cpNew1').value='';
  document.getElementById('cpNew2').value='';
  document.getElementById('changePwOverlay').classList.add('on');
  setTimeout(()=>document.getElementById('cpCur').focus(),50);
};
document.getElementById('cpCancel').onclick = () => document.getElementById('changePwOverlay').classList.remove('on');
document.getElementById('cpConfirm').onclick = () => {
  const cur  = document.getElementById('cpCur').value;
  const n1   = document.getElementById('cpNew1').value;
  const n2   = document.getElementById('cpNew2').value;
  if(cur !== ADMIN_PASSWORD){ toast('目前密碼錯誤','❌',true); return; }
  if(!n1||n1.length<6){ toast('新密碼至少 6 字元','⚠',true); return; }
  if(n1!==n2){ toast('兩次輸入不一致','❌',true); return; }
  ADMIN_PASSWORD = n1;
  localStorage.setItem('admin_pw', n1);
  document.getElementById('changePwOverlay').classList.remove('on');
  toast('密碼已成功更新 ✓','✅');
};
// cpNew1 / cpNew2 Enter 觸發確認
['cpCur','cpNew1','cpNew2'].forEach(id=>{
  document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('cpConfirm').click();};
});

// ── LOAD ───────────────────────────────
async function loadFAQ(){
  setSt('載入中…','');
  try{
    const r = await fetch('./faq.json?t='+Date.now());
    if(!r.ok) throw new Error(r.status);
    FAQ = await r.json();
    renderSidebar();
    setSt('就緒','');
  }catch(e){ setSt('讀取失敗','err'); toast('讀取失敗：'+e.message,'❌',true); }
}

// ── GITHUB ─────────────────────────────
async function ghFetch(method, path, body){
  const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/${path}`,{
    method,
    headers:{ Authorization:'token '+GH_TOKEN, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    ...(body?{body:JSON.stringify(body)}:{})
  });
  if(!r.ok){ const e=await r.json(); throw new Error(e.message||r.status); }
  return r.json();
}
async function ghSHA(path){ try{ return (await ghFetch('GET','contents/'+path)).sha; }catch{ return null; } }
const b64 = str => btoa(unescape(encodeURIComponent(str)));
const b64bin = data => data;

async function pushFAQ(){
  const json = JSON.stringify(FAQ, null, 2);
  const sha  = await ghSHA(GH_FAQ);
  await ghFetch('PUT','contents/'+GH_FAQ,{
    message:'Update FAQ '+new Date().toLocaleString('zh-TW'),
    content: b64(json),
    ...(sha?{sha}:{})
  });
}

async function uploadImg(file){
  const name = 'img_'+Date.now()+'.'+((file.name.split('.').pop()||'jpg').toLowerCase());
  const path = GH_IMG+'/'+name;
  const data = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
  const sha  = await ghSHA(path);
  await ghFetch('PUT','contents/'+path,{ message:'Upload image '+name, content:data, ...(sha?{sha}:{}) });
  return rawURL(path);
}

function rawURL(path){ return `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${path}`; }

// ── PUBLISH ────────────────────────────
async function publish(){
  collectDOM();
  if(!GH_TOKEN||!GH_OWNER||!GH_REPO){
    const blob = new Blob([JSON.stringify(FAQ,null,2)],{type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='faq.json'; a.click();
    toast('尚未設定 GitHub，已下載 faq.json（請手動上傳）','⚠',true);
    return;
  }
  setSt('發布中…','saving');
  try{
    // ── 用 GitHub Contents API（有 token 驗證，不受 CDN 快取影響）──
    try{
      const apiUrl = 'https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/faq.json';
      const apiR = await fetch(apiUrl,{headers:{Authorization:'token '+GH_TOKEN,Accept:'application/vnd.github.v3+json'}});
      if(apiR.ok){
        const apiData = await apiR.json();
        const b64 = Array.from(apiData.content).filter(c=>c!=='\n'&&c!=='\r'&&c!==' ').join('');
        const decoded = decodeURIComponent(escape(atob(b64)));
        const remote = JSON.parse(decoded);
        const localCat = FAQ[catI];
        const ri = remote.findIndex(g=>g.tag===localCat.tag);
        if(ri!==-1){ remote[ri]=localCat; }else{ remote.push(localCat); }
        FAQ = remote;
        renderSidebar();
      }
    }catch(fe){ console.warn('遠端拉取失敗，用本地推送',fe); }
    await pushFAQ();
    setSt('✓ 已發布','ok');
    toast('已推送，網站 30 秒內更新','✅');
    setTimeout(()=>setSt('就緒',''),5000);
  }
  catch(e){ setSt('失敗','err'); toast('推送失敗：'+e.message,'❌',true); }
}

// ── STATUS / TOAST ─────────────────────
function setSt(txt,cls){ const el=document.getElementById('saveStatus'); el.textContent=txt; el.className='save-status mono '+(cls||''); }
let _tid;
function toast(msg,icon,err){
  const el=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIcon').textContent=(icon||'')+(icon?' ':'');
  el.className='toast show'+(err?' err':'');
  clearTimeout(_tid); _tid=setTimeout(()=>el.className='toast',4000);
}

// ── SIDEBAR ────────────────────────────
function renderSidebar(){
  const list=document.getElementById('catList');
  list.innerHTML='';
  FAQ.forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='cat-btn'+(i===catI?' active':'');
    btn.innerHTML=`<span>${cat.category}</span><span class="cnt">${cat.items.length}</span>`;
    btn.onclick=()=>selectCat(i);
    list.appendChild(btn);
  });
}
function selectCat(i){ catI=i; openSet=new Set(); renderSidebar(); renderMain(); }

// ── MAIN ───────────────────────────────
function renderMain(){
  const area=document.getElementById('mainArea');
  if(catI<0||catI>=FAQ.length){ area.innerHTML='<div class="empty"><div class="ei">👈</div><p>選擇左側分類</p></div>'; return; }
  const cat=FAQ[catI];
  const needCfg=!GH_TOKEN||!GH_OWNER||!GH_REPO;

  area.innerHTML=`
    ${needCfg?setupHTML():''}
    <div class="cat-hd">
      <h2>${esc(cat.category)}</h2>
      <button class="btn-pub" id="pubBtn">✓ 儲存並發布</button>
    </div>
    <div class="cat-meta">
      <div class="mf"><label>分類名稱</label><input id="catName" value="${esc(cat.category)}" style="width:200px"></div>
      <div class="mf"><label>標籤</label><input id="catTag" value="${esc(cat.tag)}" style="width:110px"></div>
      <button class="btn-del-cat" id="delCatBtn">🗑 刪除分類</button>
    </div>
    <div class="faq-list" id="faqList"></div>
    <button class="btn-add-faq" id="addFaqBtn">＋ 新增問答</button>`;

  renderCards();
  document.getElementById('pubBtn').onclick    = publish;
  document.getElementById('catName').oninput   = e=>{ FAQ[catI].category=e.target.value; renderSidebar(); area.querySelector('.cat-hd h2').textContent=e.target.value; };
  document.getElementById('catTag').oninput    = e=>FAQ[catI].tag=e.target.value;
  document.getElementById('addFaqBtn').onclick = addFaq;
  document.getElementById('delCatBtn').onclick = ()=>confirmDel(`確定刪除「${FAQ[catI].category}」及其 ${FAQ[catI].items.length} 則問答嗎？`,()=>{
    FAQ.splice(catI,1); catI=Math.max(0,catI-1); renderSidebar();
    if(FAQ.length) renderMain(); else area.innerHTML='<div class="empty"><div class="ei">👈</div><p>從左側新增分類</p></div>';
  });
  if(needCfg) document.getElementById('saveCfgBtn').onclick=saveGHConfig;
}

function setupHTML(){
  return `<div class="setup-panel">
    <h3>⚙ 設定 GitHub 自動發布</h3>
    <p>設定後按「儲存並發布」直接更新線上網站。需要 Personal Access Token（<a href="https://github.com/settings/tokens/new?scopes=repo&description=db3d-admin" target="_blank">點此申請 →</a>，勾選 <strong>repo</strong>）</p>
    <div class="cfg-grid">
      <div class="cfg-field"><label>GitHub 帳號</label><input id="cfgOwner" value="${esc(GH_OWNER)}" placeholder="帳號"></div>
      <div class="cfg-field"><label>Repo 名稱</label><input id="cfgRepo" value="${esc(GH_REPO)}" placeholder="db3d-helpcenter"></div>
    </div>
    <div class="cfg-grid one">
      <div class="cfg-field"><label>Personal Access Token</label><input id="cfgToken" type="password" value="${esc(GH_TOKEN)}" placeholder="ghp_xxxxx"></div>
    </div>
    <button class="btn-cfg" id="saveCfgBtn">儲存設定</button>
  </div>`;
}

function saveGHConfig(){
  GH_OWNER=document.getElementById('cfgOwner').value.trim();
  GH_REPO =document.getElementById('cfgRepo').value.trim();
  GH_TOKEN=document.getElementById('cfgToken').value.trim();
  lsSet('gh_owner',GH_OWNER); lsSet('gh_repo',GH_REPO); lsSet('gh_token',GH_TOKEN);
  toast('GitHub 設定已儲存','✅'); renderMain();
}

// ── CARDS ──────────────────────────────
function renderCards(){
  const list=document.getElementById('faqList');
  if(!list)return;
  list.innerHTML='';
  FAQ[catI].items.forEach((item,i)=>{
    const isOpen=openSet.has(i);
    const card=document.createElement('div');
    card.className='faq-card'+(isOpen?' open':'');
    card.dataset.i=i;

    card.innerHTML=`
      <div class="card-top">
        <span class="drag">⠿</span>
        <span class="card-qprev">${esc(item.q)||'（未填寫問題）'}</span>
        <div class="card-acts">
          <button class="ic tog-ic">${isOpen?'▲':'▼'}</button>
          <button class="ic del del-ic">✕</button>
        </div>
      </div>
      <div class="card-body">
        <div class="form-row">
          <span class="flabel">問題 Q</span>
          <input class="q-inp" value="${esc(item.q)}" placeholder="輸入問題…">
        </div>
        <div class="form-row">
          <span class="flabel">答案 A（HTML 格式）</span>
          <div class="editor-wrap">
            <div class="toolbar" id="tb-${i}">
              <button class="tool-btn btn-img-url" title="插入圖片（貼網址）">🖼 圖片網址</button>
              <button class="tool-btn btn-img-up"  title="上傳圖片到 GitHub">⬆ 上傳圖片</button>
              <div class="tool-sep"></div>
              <button class="tool-btn btn-yt"      title="嵌入 YouTube 影片">▶ YouTube</button>
              <button class="tool-btn btn-html"    title="插入自訂 HTML">＜/＞ HTML</button>
              <div class="tool-sep"></div>
              <button class="tool-btn btn-bold">𝐁 粗體</button>
              <button class="tool-btn btn-link">🔗 連結</button>
              <button class="tool-btn btn-br">↵ 換行</button>
            </div>
            <div class="up-status" id="upst-${i}">上傳圖片中，請稍候…</div>
            <div class="editor-tabs" id="etabs-${i}">
              <div class="etab active" data-pane="edit">✏ 編輯</div>
              <div class="etab" data-pane="preview">👁 預覽</div>
            </div>
            <div class="editor-pane active" id="epane-edit-${i}">
              <textarea class="a-inp">${esc(item.a)}</textarea>
            </div>
            <div class="editor-pane" id="epane-preview-${i}">
              <div class="preview-area" id="prev-${i}"></div>
            </div>
          </div>
        </div>
      </div>`;

    // toggle card
    const toggleFn=()=>{ collectDOM(); isOpen?openSet.delete(i):openSet.add(i); renderCards(); };
    card.querySelector('.card-top').onclick=e=>{ if(!e.target.closest('.card-acts'))toggleFn(); };
    card.querySelector('.tog-ic').onclick=e=>{ e.stopPropagation(); toggleFn(); };

    // delete
    card.querySelector('.del-ic').onclick=e=>{
      e.stopPropagation();
      confirmDel(`確定刪除「${item.q||'此問答'}」嗎？`,()=>{
        collectDOM(); FAQ[catI].items.splice(i,1);
        openSet=new Set([...openSet].filter(x=>x!==i).map(x=>x>i?x-1:x));
        renderCards(); renderSidebar();
      });
    };

    // q live preview
    card.querySelector('.q-inp').oninput=e=>card.querySelector('.card-qprev').textContent=e.target.value||'（未填寫問題）';

    if(isOpen){
      const ta=card.querySelector('.a-inp');

      // editor tabs
      card.querySelectorAll('.etab').forEach(tab=>{
        tab.onclick=()=>{
          card.querySelectorAll('.etab').forEach(t=>t.classList.remove('active'));
          card.querySelectorAll('.editor-pane').forEach(p=>p.classList.remove('active'));
          tab.classList.add('active');
          const pane=document.getElementById('epane-'+tab.dataset.pane+'-'+i);
          pane.classList.add('active');
          if(tab.dataset.pane==='preview'){
            document.getElementById('prev-'+i).innerHTML=ta.value;
          }
        };
      });

      // 🖼 圖片網址
      card.querySelector('.btn-img-url').onclick=()=>{
        const url=prompt('貼上圖片網址：');
        if(!url)return;
        ins(ta,`\n<img src="${url}" alt="圖片" style="max-width:100%;border-radius:8px;margin:10px 0;">\n`);
      };

      // ⬆ 上傳圖片
      card.querySelector('.btn-img-up').onclick=()=>{
        if(!GH_TOKEN||!GH_OWNER||!GH_REPO){ toast('請先填寫上方 GitHub 設定','⚠',true); return; }
        imgCb=async file=>{
          document.getElementById('upst-'+i).style.display='block';
          try{
            const url=await uploadImg(file);
            ins(ta,`\n<img src="${url}" alt="圖片" style="max-width:100%;border-radius:8px;margin:10px 0;">\n`);
            toast('圖片上傳成功','✅');
          }catch(e){ toast('上傳失敗：'+e.message,'❌',true); }
          finally{ document.getElementById('upst-'+i).style.display='none'; }
        };
        document.getElementById('imgFile').click();
      };

      // ▶ YouTube
      card.querySelector('.btn-yt').onclick=()=>{
        const url=prompt('貼上 YouTube 網址：');
        if(!url)return;
        const m=url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
        if(!m){ toast('無法辨識 YouTube 網址','❌',true); return; }
        ins(ta,`\n<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin:10px 0;">\n  <iframe src="https://www.youtube.com/embed/${m[1]}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen loading="lazy"></iframe>\n</div>\n`);
      };

      // </> HTML
      card.querySelector('.btn-html').onclick=()=>{
        const snip=prompt('貼入 HTML 片段：');
        if(snip)ins(ta,'\n'+snip+'\n');
      };

      // 粗體
      card.querySelector('.btn-bold').onclick=()=>{
        const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.slice(s,e)||'文字';
        ins(ta.value.slice(0,s)===ta.value.slice(0,s)?ta:'',`<strong>${sel}</strong>`);
        const before=ta.value.slice(0,s); const after=ta.value.slice(e);
        ta.value=before+`<strong>${sel}</strong>`+after;
        ta.selectionStart=s; ta.selectionEnd=s+`<strong>${sel}</strong>`.length; ta.focus();
      };

      // 連結
      card.querySelector('.btn-link').onclick=()=>{
        const href=prompt('連結網址：'); if(!href)return;
        const txt=prompt('連結文字：')||href;
        ins(ta,`<a href="${href}" target="_blank" rel="noopener">${txt}</a>`);
      };

      // 換行
      card.querySelector('.btn-br').onclick=()=>ins(ta,'<br>\n');

      // auto-resize textarea
      ta.oninput=()=>{ ta.style.height='auto'; ta.style.height=Math.max(420,ta.scrollHeight)+'px'; };
      // 初始高度
      setTimeout(()=>{ ta.style.height='auto'; ta.style.height=Math.max(420,ta.scrollHeight)+'px'; },0);
    }

    list.appendChild(card);
  });
}

// ── COLLECT DOM → FAQ ──────────────────
function collectDOM(){
  const list=document.getElementById('faqList');
  if(!list)return;
  list.querySelectorAll('.faq-card').forEach(card=>{
    const i=parseInt(card.dataset.i);
    if(FAQ[catI]?.items[i]!=null){
      FAQ[catI].items[i].q=card.querySelector('.q-inp')?.value??'';
      FAQ[catI].items[i].a=card.querySelector('.a-inp')?.value??'';
    }
  });
}

function addFaq(){
  collectDOM();
  FAQ[catI].items.push({q:'',a:''});
  const ni=FAQ[catI].items.length-1;
  openSet.add(ni); renderCards(); renderSidebar();
  setTimeout(()=>document.querySelectorAll('.faq-card')[ni]?.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

// ── IMAGE FILE INPUT ────────────────────
document.getElementById('imgFile').onchange=async e=>{
  const file=e.target.files[0]; e.target.value='';
  if(file&&imgCb){ await imgCb(file); imgCb=null; }
};

// ── ADD CAT MODAL ───────────────────────
document.getElementById('addCatBtn').onclick=()=>{
  document.getElementById('ncName').value='';
  document.getElementById('ncTag').value='';
  document.getElementById('addCatOverlay').classList.add('on');
  setTimeout(()=>document.getElementById('ncName').focus(),50);
};
document.getElementById('ncCancel').onclick =()=>document.getElementById('addCatOverlay').classList.remove('on');
document.getElementById('ncConfirm').onclick=()=>{
  const name=document.getElementById('ncName').value.trim();
  const tag =document.getElementById('ncTag').value.trim();
  if(!name)return;
  FAQ.push({category:name,tag:tag||name,items:[]});
  renderSidebar(); selectCat(FAQ.length-1);
  document.getElementById('addCatOverlay').classList.remove('on');
};
['ncName','ncTag'].forEach(id=>document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('ncConfirm').click();});

// ── DELETE MODAL ────────────────────────
function confirmDel(msg,cb){
  delCb=cb;
  document.getElementById('delMsg').textContent=msg;
  document.getElementById('delOverlay').classList.add('on');
}
document.getElementById('delCancel').onclick =()=>document.getElementById('delOverlay').classList.remove('on');
document.getElementById('delConfirm').onclick=()=>{ document.getElementById('delOverlay').classList.remove('on'); if(delCb)delCb(); delCb=null; };

// ── HELPERS ─────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ins(ta,text){ const s=ta.selectionStart,e=ta.selectionEnd; ta.value=ta.value.slice(0,s)+text+ta.value.slice(e); ta.selectionStart=ta.selectionEnd=s+text.length; ta.focus(); }
</script>
</body>
